<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Amir Kazemkhani</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <style>
    :root {
      --primary: rgb(37, 99, 235);
      --background: rgb(248, 250, 252);
      --text: rgb(30, 41, 59);
      --card: rgb(255, 255, 255);
      --border: rgb(226, 232, 240);
      --muted: rgb(148, 163, 184);
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --background: rgb(15, 23, 42);
        --text: rgb(248, 250, 252);
        --card: rgb(30, 41, 59);
        --border: rgb(51, 65, 85);
        --muted: rgb(148, 163, 184);
      }
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--background);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      line-height: 1.5;
    }
    
    .container {
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1rem;
      box-sizing: border-box;
    }
    
    header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }
    
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 1rem;
    }
    
    .card {
      background-color: var(--card);
      border-radius: 0.5rem;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      padding: 2rem;
      max-width: 32rem;
      width: 100%;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 1.875rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text);
    }
    
    p {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 1.5rem;
    }
    
    .icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      color: var(--primary);
    }
    
    .button {
      display: inline-block;
      background-color: var(--primary);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.375rem;
      font-weight: 600;
      text-decoration: none;
      transition: background-color 0.2s;
      border: none;
      cursor: pointer;
    }
    
    .button:hover {
      background-color: rgb(29, 78, 216);
    }
    
    footer {
      text-align: center;
      padding: 1.5rem 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.875rem;
      color: var(--muted);
    }
    
    @media (max-width: 640px) {
      .card {
        padding: 1.5rem;
      }
      
      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Amir Kazemkhani</div>
  </header>
  
  <main>
    <div class="card">
      <div class="icon">📶</div>
      <h1>You're Offline</h1>
      <p>It looks like you've lost your internet connection. Check your network and try again.</p>
      <p>Some of the content is available offline, but you need to connect to the internet to access all features.</p>
      <button class="button" onclick="window.location.reload()">Try Again</button>
    </div>
  </main>
  
  <footer>
    <p>&copy; <span id="year">2023</span> Amir Kazemkhani. All rights reserved.</p>
  </footer>
  
  <script>
    // Update year
    document.getElementById('year').textContent = new Date().getFullYear();
    
    // Check if online and redirect if so
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
