<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Amir Kazemkhani</title>
  <meta name="theme-color" content="#0a0a0a">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      background: #0a0a0a;
      color: #ece4d4;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .gold { color: #c9a84c; }
    p { color: #8a8a8a; max-width: 24rem; line-height: 1.6; }
    .divider { width: 4rem; height: 1px; background: linear-gradient(90deg, transparent, #c9a84c, transparent); margin: 1.5rem auto; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #c9a84c;
      color: #0a0a0a;
      border: none;
      border-radius: 9999px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Amir<span class="gold">K</span></h1>
  <div class="divider"></div>
  <p>You're offline. Check your connection and try again.</p>
  <button onclick="window.location.reload()">Retry</button>
  <script>window.addEventListener('online', () => window.location.reload());</script>
</body>
</html>
