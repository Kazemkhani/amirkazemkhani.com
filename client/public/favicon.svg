<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" />
      <stop offset="50%" stop-color="#e7bc66" />
      <stop offset="100%" stop-color="#c9a84c" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="#0a0a0a"/>
  <!-- Calligraphic "A" — two legs from peak + crossbar -->
  <path
    d="M 95 415
       C 85 280, 150 85, 260 65
       C 365 48, 425 250, 420 415"
