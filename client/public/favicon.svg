<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e7bc66" />
      <stop offset="50%" stop-color="#c9a84c" />
      <stop offset="100%" stop-color="#b8943f" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#0a0a0a"/>
  <!-- "A" — left letter, modern geometric with sharp apex -->
  <path
    d="M 108 390 L 196 130 L 284 390"
    fill="none"
    stroke="url(#gold)"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- A crossbar -->
  <line x1="140" y1="300" x2="252" y2="300"
    stroke="url(#gold)"
    stroke-width="16"
    stroke-linecap="round"
  />
  <!-- "K" — right letter, angular with detached arms -->
  <line x1="310" y1="130" x2="310" y2="390"
    stroke="url(#gold)"
    stroke-width="22"
    stroke-linecap="round"
  />
  <!-- K upper arm -->
  <line x1="310" y1="270" x2="410" y2="130"
    stroke="url(#gold)"
    stroke-width="18"
    stroke-linecap="round"
  />
  <!-- K lower arm -->
  <line x1="310" y1="270" x2="420" y2="390"
    stroke="url(#gold)"
    stroke-width="18"
    stroke-linecap="round"
  />
</svg>
